<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Calculate your stop price instantly. Protect your trading gains with a smart exit price based on your cost base, current price, and safeline %.">
  <meta property="og:title" content="Stop Price Calculator">
  <meta property="og:description" content="Protect your trading gains with a smart stop price calculator.">
  <meta property="og:type" content="website">
  <title>Stop Price Calculator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <h1><i class="ti ti-chart-line" aria-hidden="true"></i>Stop Price Calculator</h1>
      <p>Protect your gains with a smart exit price</p>
    </div>

    <div class="card">
      <div class="field">
        <label for="costBase"><i class="ti ti-building-bank" aria-hidden="true"></i>Cost base</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="costBase" placeholder="0.00" min="0" step="0.01" inputmode="decimal" autocomplete="off">
        </div>
      </div>

      <div class="field">
        <label for="currentPrice"><i class="ti ti-trending-up" aria-hidden="true"></i>Current price</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="currentPrice" placeholder="0.00" min="0" step="0.01" inputmode="decimal" autocomplete="off">
        </div>
      </div>

      <div class="field">
        <label for="numShares">
          <i class="ti ti-stack-2" aria-hidden="true"></i>Number of shares
          <span class="optional-tag">optional</span>
        </label>
        <div class="input-wrap">
          <input type="number" id="numShares" class="no-prefix" placeholder="1" min="1" step="1" inputmode="numeric" autocomplete="off">
        </div>
      </div>

      <div class="field">
        <label><i class="ti ti-shield-check" aria-hidden="true"></i>Safeline %</label>
        <div class="preset-row">
          <button class="preset-btn" data-val="75">75%</button>
          <button class="preset-btn" data-val="85">85%</button>
          <button class="preset-btn" data-val="90">90%</button>
          <button class="preset-btn" data-val="95">95%</button>
        </div>
        <div class="slider-label-row">
          <span class="slider-label">Custom</span>
          <span class="slider-value" id="sliderVal">90%</span>
        </div>
        <input type="range" id="safelineSlider" min="1" max="99" step="1" value="90" aria-label="Safeline percentage">
      </div>
    </div>

    <div class="result-card" id="resultCard" aria-live="polite">
      <div class="result-label">Stop price</div>
      <div class="result-price" id="resultPrice">—</div>
      <div class="result-grid">
        <div class="result-stat"><div class="stat-label">Cost base</div><div class="stat-val" id="rCost">—</div></div>
        <div class="result-stat"><div class="stat-label">Current price</div><div class="stat-val" id="rCurrent">—</div></div>
        <div class="result-stat"><div class="stat-label">Safeline</div><div class="stat-val" id="rSafe">90%</div></div>
        <div class="result-stat"><div class="stat-label">Shares</div><div class="stat-val" id="rShares">1</div></div>
        <div class="result-stat result-stat--wide"><div class="stat-label">Gain protected</div><div class="stat-val" id="rGain">—</div></div>
        <div class="result-stat result-stat--wide"><div class="stat-label">Trailing stop %</div><div class="stat-val" id="rTrailing">—</div></div>
      </div>
      <button class="reset-btn" id="resetBtn" aria-label="Reset all fields">
        <i class="ti ti-refresh" aria-hidden="true"></i> Reset
      </button>
    </div>

    <footer class="footer">
      <p>Results are estimates only. Not financial advice.</p>
    </footer>
  </div>

  <script src="js/calculator.js?v=2"></script>
</body>
</html>
